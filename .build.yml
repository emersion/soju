image: archlinux
packages:
  - mandoc
  - rsync
  - scdoc
secrets:
  - 77c7956b-003e-44f7-bb5c-2944b2047654 # deploy SSH key
sources:
  - https://git.sr.ht/~emersion/soju
tasks:
  - man: |
      cd soju
      git checkout master
      make doc/soju.1
      mandoc -T html -O style=man-style.css <doc/soju.1 >doc/soju.1.html
      make clean
  - upload: |
      cd soju
      git checkout website
      sshopts="-o StrictHostKeyChecking=no"
      rsync --rsh="ssh $sshopts" -rP \
          --delete \
          --delete-excluded \
          --exclude .git \
          . deploy@sheeta.emersion.fr:/srv/http/soju
triggers:
  - action: email
    condition: failure
    to: "<contact@emersion.fr>"
